name: Basha 2
 
on:
  push:
    branches: [ "main" ]  
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 
  schedule: 
    - cron: '30 */1 * * *'
jobs:  
  emulator-video: 
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      # - name: Pick random supported device
      #   id: pick-device
      #   run: |
      #     devices=("pixel" "pixel_2" "pixel_2_xl" "pixel_3" "pixel_3_xl" "pixel_3a" "pixel_4" "pixel_4_xl" "pixel_5" "pixel_6" "pixel_6_pro" "pixel_7" "pixel_7_pro" "nexus_5x" "nexus_6p")
      #     random_device=${devices[$RANDOM % ${#devices[@]}]}
      #     echo "device=$random_device" >> $GITHUB_OUTPUT
      #     echo "Selected device: $random_device"
      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true


            
      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_2
          avd-name: test
          force-avd-creation: true
          # emulator-boot-timeout: 1200
          disable-animations: true
          # emulator-options: -no-window -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            # adb shell dumpsys battery set ac $((RANDOM % 2))
            # adb shell dumpsys battery set level $((6 + RANDOM % 95))  
            charging_state=$((RANDOM % 2))
            battery_level=$((6 + RANDOM % 95))
            adb shell dumpsys battery set ac $charging_state
            adb shell dumpsys battery set level $battery_level
            adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/"
            sleep 7
            adb exec-out screencap -p > screenshot_menu.png
            # قبول بالاناقة
            adb shell input tap 543 1615
            sleep 2
            adb shell input tap 543 1555
            sleep 1
            adb shell input tap 315 1095
            adb shell input tap 543 1415
            sleep 5
            adb shell input tap 315 1095
            adb shell input tap 543 1615
            sleep 1
            adb shell input tap 543 1555
            # # قبول الشروط
            # adb shell input tap 543 1704
            # adb shell input tap 543 1544
            # adb shell input tap 543 1654
            # adb shell input tap 543 1560
            sleep 2
            adb shell input tap 145 1690
            adb shell input tap 195 1695
            sleep 19
            adb exec-out screencap -p > screenshot_open.png
            adb shell input tap 315 1095
            adb shell input tap 615 1475
            sleep 2
            adb shell input tap 520 1380
            sleep 2
            adb exec-out screencap -p > screenshot_notifi.png
            adb shell input tap 315 645
            sleep 2
            adb shell input tap 535 1570
            adb shell input tap 415 645

            adb shell input swipe 500 1500 500 200
            adb shell input swipe 540 500 540 -1500 
            # adb shell input tap 500 1399
            # adb shell input keyevent 82
            # adb shell input tap 500 1695
            sleep 2
            adb shell input swipe 540 1500 540 200 
            adb shell input swipe 540 1500 540 100 500
            adb shell input swipe 540 1500 540 100 
            sleep 2
            adb shell input swipe 540 1500 540 200 
            # adb exec-out screencap -p > screenshot_desk.png
            adb shell input tap 150 1600
            # sleep 2
            adb shell input tap 150 1600
            sleep 2
            adb shell input tap 200 1625
            sleep 8
            adb exec-out screencap -p > screenshot_btton.png
            # adb shell cmd statusbar expand-notifications
            # adb shell service call statusbar 1
            # sleep 1
            # adb exec-out screencap -p > screenshot_notifi.png
            # adb shell pm list packages /> apps.txt

           
