name: Omplasa
 
on:
  push: 
    branches: [ "main" ]  
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 
  schedule: 
    - cron: '5 */1 * * *'
jobs:   
  emulator-video: 
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true


            
      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_4_xl
          avd-name: test
          force-avd-creation: true
          disable-animations: true
          script: |
            adb wait-for-device
            # adb shell dumpsys battery set ac $((RANDOM % 2))
            # adb shell dumpsys battery set level $((6 + RANDOM % 95))  
            charging_state=$((RANDOM % 2))
            battery_level=$((6 + RANDOM % 95))
            adb shell dumpsys battery set ac $charging_state
            adb shell dumpsys battery set level $battery_level
            adb shell am start -a android.intent.action.VIEW -d "https://bellaa-vista.netlify.app/"
            sleep 10
            # قبول بالاناقة
            adb shell input tap 543 2745
            sleep 2
            adb shell input tap 580 2635
            sleep 1
            # Wait
            adb shell input tap 445 1700
            # retry
            adb shell input tap 722 2340
            sleep 6
            # Wait
            adb shell input tap 445 1700
            adb shell input tap 543 2745
            sleep 1
            adb shell input tap 580 2635
            sleep 2
            adb shell input tap 165 2888
            # adb shell input tap 195 1695
            sleep 19
            adb shell input tap 445 1700
            adb shell input tap 777 2200
            sleep 2
            adb shell input tap 520 1380
            sleep 2
            adb shell input tap 315 645
            sleep 2
            adb shell input tap 535 1570
            adb shell input tap 415 645
            sleep 5

            adb shell am start -a android.intent.action.VIEW -d "https://bellaa-vista.netlify.app/"
            sleep 20
            adb shell input tap 445 1700
            adb shell input tap 777 2200
            sleep 2
            adb shell input tap 520 1380
            sleep 2
            adb shell input tap 315 645
            adb shell input swipe 500 1500 500 200
            sleep 10
            adb shell am start -a android.intent.action.VIEW -d "https://bellaa-vista.netlify.app/"
            sleep 20
            adb shell input tap 445 1700
            adb shell input tap 777 2200
            sleep 2
            adb shell input tap 520 1380
            sleep 2
            adb shell input tap 315 645
            adb shell input swipe 540 500 540 -1500 
            sleep 2
            adb shell input swipe 540 2500 540 300 
            adb shell input swipe 540 2500 540 300 250
            # adb shell input swipe 540 1500 540 100 
            sleep 2
            adb shell input tap 150 2400
            # sleep 2
            adb shell input tap 150 2500
            sleep 2
            adb shell input tap 200 2625

           
