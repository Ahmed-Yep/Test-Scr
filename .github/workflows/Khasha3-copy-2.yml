name: Khasha 3
 
on:
  push:
    branches: [ "main" ]  
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 
  schedule: 
    - cron: '10 */1 * * *'
jobs:  
  emulator-video: 
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      # - name: Pick random supported device
      #   id: pick-device
      #   run: |
      #     devices=("pixel" "pixel_2" "pixel_2_xl" "pixel_3" "pixel_3_xl" "pixel_3a" "pixel_4" "pixel_4_xl" "pixel_5" "pixel_6" "pixel_6_pro" "pixel_7" "pixel_7_pro" "nexus_5x" "nexus_6p")
      #     random_device=${devices[$RANDOM % ${#devices[@]}]}
      #     echo "device=$random_device" >> $GITHUB_OUTPUT
      #     echo "Selected device: $random_device"
      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true


            
      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_3
          avd-name: test
          force-avd-creation: true
          # emulator-boot-timeout: 1200
          disable-animations: true
          # emulator-options: -no-window -gpu swiftshader_indirect
          script: |
            adb wait-for-device
            # adb shell dumpsys battery set ac $((RANDOM % 2))
            # adb shell dumpsys battery set level $((6 + RANDOM % 95))  
            charging_state=$((RANDOM % 2))
            battery_level=$((6 + RANDOM % 95))
            adb shell dumpsys battery set ac $charging_state
            adb shell dumpsys battery set level $battery_level
            # wget -O firefox.apk "https://eb5e7388c3df147b74dd2379b7cf8323.r2.cloudflarestorage.com/downloadprod/wp-content/uploads/2025/10/62/68e5788a121c6/org.mozilla.fennec_fdroid_143.0.3-1430320_minAPI21%28arm64-v8a%29%28nodpi%29_apkmirror.com.apk?X-Amz-Content-Sha256=UNSIGNED-PAYLOAD&X-Amz-Algorithm=AWS4-HMAC-SHA256&X-Amz-Credential=72a5ba3a0b8a601e535d5525f12f8177%2F20260322%2Fauto%2Fs3%2Faws4_request&X-Amz-Date=20260322T191502Z&X-Amz-SignedHeaders=host&X-Amz-Expires=3600&X-Amz-Signature=d2460403bcd9ea44287a2befcc8c2a7c69cfe0b2bc490a4b919ddc25ae24ef9b"
            # adb install firefox.apk
            sleep 2
            # adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/" org.mozilla.fennec_fdroid
            adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/" 
            sleep 5
            adb exec-out screencap -p > screenshot_menu.png
            # # قبول بالاناقة
            adb shell input tap 443 1800
            sleep 2
            adb shell input tap 410 1850
            sleep 1
            adb shell input tap 315 1095
            adb shell input tap 540 1670
            sleep 5
