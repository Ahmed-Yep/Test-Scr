name: Jabtah
 
on:
  push: 
    branches: [ "main" ]  
  pull_request: 
    branches: [ "main" ] 
  workflow_dispatch: 
  schedule: 
    - cron: '26 */1 * * *'
jobs:   
  emulator-video: 
    runs-on: ubuntu-latest

    steps:  
      - name: Checkout 
        uses: actions/checkout@v4

      - name: Set up JDK 17 
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Android SDK 
        uses: android-actions/setup-android@v3

      - name: Enable KVM group perms
        run: | 
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -al /dev/kvm || true


            
      - name: Launch emulator and run script
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          avd-name: test
          force-avd-creation: true
          disable-animations: true
          script: |
            adb wait-for-device
            # adb shell dumpsys battery set ac $((RANDOM % 2))
            # adb shell dumpsys battery set level $((6 + RANDOM % 95))  
            charging_state=$((RANDOM % 2))
            battery_level=$((6 + RANDOM % 95))
            adb shell dumpsys battery set ac $charging_state
            adb shell dumpsys battery set level $battery_level
            adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/"
            sleep 10
            # adb exec-out screencap -p > screenshot_menu.png
            # قبول بالاناقة
            adb shell input tap 443 1915
            sleep 2
            adb shell input tap 380 2025
            sleep 1
            # Wait
            adb shell input tap 445 1290
            # retry
            adb shell input tap 540 1785
            sleep 6
            # Wait
            adb shell input tap 445 1290
            adb shell input tap 443 1915
            sleep 1
            adb shell input tap 380 2025
            sleep 1
            sleep 19
            # adb exec-out screencap -p > screenshot_open.png
            adb shell input tap 555 1740
            sleep 2
            adb shell input tap 520 766
            sleep 2
            # adb exec-out screencap -p > screenshot_notifi.png
            adb shell input tap 315 645
            sleep 5
            adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/"
            sleep 20
            adb shell input tap 555 1740
            adb shell input tap 535 1570
            adb shell input tap 415 645

            adb shell input swipe 500 1500 500 500
            adb shell input swipe 540 500 540 -1500 
            sleep 1
            adb shell am start -a android.intent.action.VIEW -d "https://rescend.netlify.app/"
            sleep 20
            adb shell input tap 555 1740
            adb shell input tap 535 1570
            adb shell input tap 415 645
            adb shell input swipe 540 2500 540 300 
            sleep 1
            adb shell input swipe 540 2000 540 300 250
            adb shell input swipe 540 1500 540 350 
            adb shell input tap 150 2000
            sleep 1
            adb shell input tap 200 1900
            sleep 5
            # adb exec-out screencap -p > screenshot_btton.png
